services:
  - type: web
    name: team-goals-crm
    runtime: node
    plan: free           # NOTE: free plan = database har deploy/restart pe reset + 15 min idle pe spin-down
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

